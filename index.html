<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Hosting</title>
    <link rel="preload" href="aya.css" as="style" />
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="aya.css">
    <script src="https://kit.fontawesome.com/96f8243717.js" crossorigin="anonymous"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <article class="headers">
        <span onclick="openNav()" style="font-size: var(--step-1);"><i class="fa fa-bars" aria-hidden="true"></i> Courses</span>
        <div class="logos"><img src="backgrounds/logo.png" alt="Logo"></div>
        <div id="auth-container">
            <button id="auth-button">Login</button>
        </div>
    </article>

    <!-- The overlay navbar -->
    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="#">Home</a>
            <a href="#">Cosmetic</a>
            <a href="#">Nutrition</a>
            <a href="#">Physical Therapy</a>
        </div>
    </div>

    <section class="hero">
        <div class="hero-content">
            <h1 style="color: white;">Welcome to Your Learning Journey</h1>
            <h2 style="color: white;">Choose from our courses and learn at your own pace.</h2>
        </div>
        <div class="social">
            <div class="social-icons">
                <button id="send-me-an-email-here">
                    <a href="mailto:tutiba.info@gmail.com" target="_blank">
                        <i class="fa-solid fa-envelope"></i> Send Us an Email
                    </a>
                </button>
            </div>
        </div>
    </section>

    <main class="main-section">
        <h2 style="font-size: var(--step-1); margin: 0 auto; text-align: center; padding: 30px;">Explore Some of Our Courses</h2>
        <div class="course-grid">
            <!-- Add course cards as necessary -->
        </div>
    </main>

    <footer style="float: root;">
        <u>Follow Us:</u>
        <p><a href="https://www.facebook.com/Dr.Aya.Elbrashy?mibextid=gik2fB" target="_blank" class="footer-links">
            <i class="fa-brands fa-facebook"></i> Follow our Facebook Page</a>
        </p>
        <!-- Add more links as necessary -->
    </footer>

    <script>
        // Open the navigation menu
        function openNav() {
            document.getElementById("myNav").style.width = "40%";
        }

        // Close the navigation menu
        function closeNav() {
            document.getElementById("myNav").style.width = "0%";
        }

        document.addEventListener('DOMContentLoaded', () => {
            const authContainer = document.getElementById('auth-container');
            const authButton = document.getElementById('auth-button');

            // Initialize Netlify Identity
            netlifyIdentity.init();

            // Function to update UI based on authentication state
            const updateUI = (user) => {
                if (user && user.email) {
                    // Display logged-in user information
                    authContainer.innerHTML = `
                        <p>Welcome, ${user.email}</p>
                        <button id="logout-button">Logout</button>
                    `;
                    document.getElementById('logout-button').addEventListener('click', handleAuthentication);
                } else {
                    // Display login button for logged-out state
                    authContainer.innerHTML = `
                        <button id="auth-button">Login</button>
                    `;
                    document.getElementById('auth-button').addEventListener('click', handleAuthentication);
                }
            };

            // Handle login and logout actions
            const handleAuthentication = () => {
                const currentUser = netlifyIdentity.currentUser();
                if (currentUser) {
                    // Log out if a user is logged in
                    netlifyIdentity.logout();
                } else {
                    // Open login modal if no user is logged in
                    netlifyIdentity.open();
                }
            };

            // Listen for login and logout events
            netlifyIdentity.on('login', (user) => {
                updateUI(user);
                netlifyIdentity.close(); // Close the login modal
            });

            netlifyIdentity.on('logout', () => {
                updateUI(null);
            });

            // Set initial state
            const currentUser = netlifyIdentity.currentUser();
            updateUI(currentUser);

            // Attach event listener for authentication button
            authButton.addEventListener('click', handleAuthentication);
        });
    </script>
</body>
</html>
